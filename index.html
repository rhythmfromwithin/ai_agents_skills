  /* Hero */
  .hero { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); padding: 60px 24px 40px; text-align: center; border-bottom: 1px solid var(--border); position: relative; overflow: hidden; }
  .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 0%, rgba(99,102,241,0.15) 0%, transparent 70%); pointer-events: none; }
  .hero h1 { font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 800; letter-spacing: -0.03em; background: linear-gradient(135deg, #fff 30%, #a5b4fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 12px; }
  .hero p { color: #94a3b8; font-size: 1.1rem; max-width: 600px; margin: 0 auto 32px; }
  .stats-row { display: flex; justify-content: center; gap: 32px; flex-wrap: wrap; }
  .stat { text-align: center; }
  .stat-num { font-size: 2.2rem; font-weight: 800; background: linear-gradient(135deg, #a5b4fc, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
  .stat-label { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }

  /* Search + Filters */
  .controls { position: sticky; top: 0; z-index: 100; background: rgba(15,15,19,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 16px 24px; }

  .search-wrap { flex: 1; min-width: 220px; position: relative; }

  #search:focus { border-color: var(--pm); }
  #search::placeholder { color: var(--muted); }
  .filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
  .tab { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 0.78rem; cursor: pointer; transition: all .2s; white-space: nowrap; }

  .tab[data-cat="all"].active { background: var(--pm); border-color: var(--pm); }
  .tab[data-cat="pm"].active { background: var(--pm); border-color: var(--pm); }
  .tab[data-cat="marketing"].active { background: var(--marketing); border-color: var(--marketing); color: #000; }

  .tab[data-cat="frontend"].active { background: var(--frontend); border-color: var(--frontend); color: #000; }
  .tab[data-cat="backend"].active { background: var(--backend); border-color: var(--backend); color: #000; }
  .tab[data-cat="ai"].active { background: var(--ai); border-color: var(--ai); }
  .tab[data-cat="mobile"].active { background: var(--mobile); border-color: var(--mobile); color: #000; }
  .tab[data-cat="security"].active { background: var(--security); border-color: var(--security); }
  .tab[data-cat="data"].active { background: var(--data); border-color: var(--data); color: #000; }
  .tab[data-cat="monitoring"].active { background: var(--monitoring); border-color: var(--monitoring); }
  .tab[data-cat="payments"].active { background: var(--payments); border-color: var(--payments); color: #000; }

  .tab[data-cat="productivity"].active { background: var(--productivity); border-color: var(--productivity); }

  /* Main */

  /* Category section */
  .category-section { margin-bottom: 48px; }

  .cat-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

  .pm-banner-text p { font-size: 0.85rem; color: #64748b; }

  /* Hidden */

    .hero { padding: 40px 16px 28px; }
    .stats-row { gap: 20px; }

// ── RENDER ────────────────────────────────────────────────────────────
function render(filter = 'all', query = '') {
  const main = document.getElementById('main');
  const q = query.toLowerCase().trim();

  // Group data by category in order
  const catOrder = Object.keys(CATS);
  const grouped = {};
  DATA.forEach(group => {
    if (!grouped[group.cat]) grouped[group.cat] = [];
    grouped[group.cat].push(group);
  });

  let html = '';
  let totalVisible = 0;

  catOrder.forEach(cat => {
    if (filter !== 'all' && filter !== cat) return;
    if (!grouped[cat]) return;

    const catMeta = CATS[cat];
    let catHtml = '';
    let catCount = 0;

    grouped[cat].forEach(group => {
      const matchedSkills = group.skills.filter(([name, desc]) => {
        if (!q) return true;
        return name.toLowerCase().includes(q) || desc.toLowerCase().includes(q) || group.provider.toLowerCase().includes(q);
      });
      if (!matchedSkills.length) return;
      catCount += matchedSkills.length;

      const cardsHtml = matchedSkills.map(([name, desc, url]) => `
        <a class="skill-card" href="${url}" target="_blank" rel="noopener">
          <div class="skill-name">
            <span class="cat-tag" style="background:${catMeta.color}"></span>
            ${name}
          </div>
          <div class="skill-desc">${desc}</div>
        </a>`).join('');

      catHtml += `
        <div class="provider-group">
          <div class="provider-label"><span>${group.provider}</span>${group.sub ? ' · ' + group.sub : ''}</div>
          <div class="skills-grid">${cardsHtml}</div>
        </div>`;
    });

    if (!catCount) return;
    totalVisible += catCount;

    const isPm = cat === 'pm';
    html += `
      <div class="category-section" data-cat="${cat}">
        <div class="cat-header">
          <div class="cat-dot" style="background:${catMeta.color}"></div>
          <div class="cat-title">${catMeta.label}</div>
          <div class="cat-count">${catCount} skills</div>
        </div>
        ${catHtml}
      </div>`;
  });

  if (!totalVisible) {
    html = `<div class="no-results"><svg width="48" height="48" fill="none" stroke="#6b7280" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>No skills matched "<strong>${query}</strong>"</p></div>`;
  }

  main.innerHTML = html;
}

// ── CONTROLS ──────────────────────────────────────────────────────────
let activeFilter = 'all';
let searchQuery = '';

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeFilter = tab.dataset.cat;
    render(activeFilter, searchQuery);
  });
});

let searchTimer;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQuery = e.target.value;
    render(activeFilter, searchQuery);
  }, 150);
});

render();
</script>
